services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mold-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moldagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moldagent_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mold_quality}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moldagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mold-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data

  minio:
    image: minio/minio:latest
    container_name: mold-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./volumes/minio:/data

  api-dev:
    build:
      context: .
      dockerfile: docker/api-dev.Dockerfile
    container_name: mold-api-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/backend/src
      - ./pyproject.toml:/app/pyproject.toml
      - chroma-data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started


services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mold-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moldagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moldagent_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mold_quality}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moldagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-dev:
    build:
      context: .
      dockerfile: docker/api-dev.Dockerfile
    container_name: mold-api-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/backend/src
      - ./pyproject.toml:/app/pyproject.toml
      - chroma-data:/app/chroma_data
      - cache-data:/app/cache
      - rag-logs:/app/logs/rag
    depends_on:
      postgres:
        condition: service_healthy

  web-dev:
    build:
      context: .
      dockerfile: docker/web-dev.Dockerfile
    container_name: mold-web-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - api-dev

volumes:
  chroma-data:
  cache-data:
  rag-logs:

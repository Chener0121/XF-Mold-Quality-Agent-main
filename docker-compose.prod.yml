services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mold-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mold-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: mold-api
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - chroma-data:/app/chroma_data
      - cache-data:/app/cache
      - rag-logs:/app/logs/rag
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mold-network

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: mold-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - mold-network

volumes:
  postgres-data:
  chroma-data:
  cache-data:
  rag-logs:

networks:
  mold-network:
    driver: bridge
